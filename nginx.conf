worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 12m;

    # Gzip (for responses not handled by Express compression)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    server {
        listen 80;

        # Proxy API calls to the Express server
        location /api {
            proxy_pass         http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header   Cookie $http_cookie;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Proxy OAuth routes to the Express server
        location /auth {
            proxy_pass         http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header   Cookie $http_cookie;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Static assets — aggressive caching (Vite hashes filenames)
        location /assets/ {
            root  /usr/share/nginx/html;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Serve static frontend — fallback to index.html for SPA routing
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # HTML — short cache, must revalidate
            location ~* \.html$ {
                expires 1h;
                add_header Cache-Control "public, must-revalidate";
            }
        }
    }
}
